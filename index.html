<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>카카오맵 장소 검색</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        #container { display: flex; width: 100%; height: 100vh; }
        #sidebar { width: 350px; height: 100%; padding: 20px; background: #f1f1f1; z-index: 10; overflow-y: auto; }
        #map { flex: 1; height: 100%; background-color: #e0e0e0; } /* 지도 배경색 지정 */
    </style>
</head>
<body>

    <div id="container">
        <div id="sidebar">
            <input type="text" id="keyword" placeholder="검색어를 입력하세요">
            <button onclick="searchPlaces()">검색</button>
            <ul id="results-list"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="http://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"></script>

    <script>
        let map;
        let ps;

        // 지도 초기화 함수
        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청 기준
                level: 5
            };
            map = new kakao.maps.Map(container, options); // 지도 생성
            ps = new kakao.maps.services.Places(); // 검색 객체
            
            console.log("지도 로드 완료");
            
            // 지도 로드 후 내 위치 찾기 시도
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    map.setCenter(locPosition);
                });
            }
        }

        // SDK 로드 대기
        kakao.maps.load(function() {
            initMap();
        });

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword) return alert("키워드를 입력하세요");
            ps.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const bounds = new kakao.maps.LatLngBounds();
                    for (let i = 0; i < data.length; i++) {
                        const point = new kakao.maps.LatLng(data[i].y, data[i].x);
                        new kakao.maps.Marker({ map: map, position: point });
                        bounds.extend(point);
                    }
                    map.setBounds(bounds);
                }
            });
        }
    </script>
</body>
</html>
