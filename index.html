<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우연히 내게오나봐~ 데이트 코스 추천</title>

  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"></script>

  <style>
    /* 봄 느낌 핑크 테마 설정 */
    :root {
      --main-pink: #ffafbd;
      --light-pink: #ffc3a0;
      --soft-white: #fff5f6;
      --point-rose: #ff6b81;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    body { width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-color: var(--soft-white); }

    /* 헤더 디자인 */
    header { 
      background: linear-gradient(135deg, var(--main-pink), var(--light-pink)); 
      padding: 20px; 
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 10;
    }
    header h1 { color: white; font-size: 22px; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

    /* 탭 디자인 */
    .tab-container { display: flex; justify-content: center; gap: 10px; }
    .tab { 
      padding: 10px 25px; 
      cursor: pointer; 
      border-radius: 25px; 
      font-weight: bold; 
      background: white; 
      color: var(--point-rose);
      transition: all 0.3s ease;
      border: 2px solid white;
    }
    .tab.active { background: var(--point-rose); color: white; border-color: var(--point-rose); }

    .main-wrapper { display: flex; flex: 1; height: calc(100vh - 120px); }

    /* 사이드바 디자인 */
    .sidebar { width: 320px; background: white; border-right: 1px solid #ffe4e6; display: flex; flex-direction: column; }
    #currentLocationText { padding: 15px; font-size: 14px; background: #fff0f3; color: var(--point-rose); font-weight: bold; text-align: center; }
    .result-list { flex: 1; overflow-y: auto; }
    .place-item { padding: 15px; border-bottom: 1px solid #fff0f3; cursor: pointer; }
    .place-item:hover { background: #fff9fa; }
    .place-name { font-weight: bold; color: #444; font-size: 15px; }
    .place-category { font-size: 12px; color: #999; margin-top: 3px; }

    /* 지도 */
    .map-area { flex: 1; }
    #map { width: 100%; height: 100%; }

    /* 시작 팝업 디자인 */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; border: 5px solid var(--main-pink); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
    .modal-content h2 { color: var(--point-rose); margin-bottom: 10px; }
    .modal-content input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid var(--main-pink); border-radius: 15px; outline: none; font-size: 16px; }
    .btn-search { background: var(--point-rose); color: white; border: none; padding: 15px 40px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }

    /* 말풍선(인포윈도우) 핑크색 커스텀 */
    .info-window { padding: 10px; font-size: 13px; text-align: center; border-radius: 10px; }
  </style>
</head>
<body>

<header>
  <h1>🌸 우연히 내게오나봐~ 데이트 코스 추천</h1>
  <div class="tab-container">
    <div id="foodTab" class="tab active" onclick="showTab('food')">🍴 맛있는 코스</div>
    <div id="activityTab" class="tab" onclick="showTab('activity')">🎡 즐거운 코스</div>
  </div>
</header>

<div class="main-wrapper">
  <div class="sidebar">
    <div id="currentLocationText">지역을 설정해주세요</div>
    <div id="resultList" class="result-list"></div>
  </div>
  <div class="map-area">
    <div id="map"></div>
  </div>
</div>
