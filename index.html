<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카카오맵 장소 검색</title>

  <!-- 카카오맵 SDK -->
  <script
    type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"
  ></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* 전체 레이아웃 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 영역 */
    .sidebar {
      width: 35%;
      min-width: 320px;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    /* 검색 영역 */
    .search-box {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }

    .search-box h2 {
      margin-bottom: 15px;
      color: #333;
    }

    .search-form {
      display: flex;
      gap: 10px;
    }

    .search-form input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .search-form button {
      padding: 10px 15px;
      border: none;
      background-color: #ffcd00;
      color: #000;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .search-form button:hover {
      background-color: #f5c400;
    }

    /* 검색 결과 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .place-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .place-item:hover {
      background-color: #f8f8f8;
    }

    .place-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #222;
    }

    .place-address {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    .place-phone {
      font-size: 13px;
      color: #888;
    }

    /* 오른쪽 지도 영역 */
    .map-area {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* 모바일 대응 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40%;
      }

      .map-area {
        height: 60%;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- 왼쪽 검색 영역 -->
    <div class="sidebar">

      <div class="search-box">
        <h2>장소 검색</h2>

        <form class="search-form" id="searchForm">
          <input
            type="text"
            id="keyword"
            placeholder="검색어 입력 (예: 카페)"
          />
          <button type="submit">검색</button>
        </form>
      </div>

      <!-- 검색 결과 리스트 -->
      <div class="result-list" id="resultList"></div>

    </div>

    <!-- 오른쪽 지도 영역 -->
    <div class="map-area">
      <div id="map"></div>
    </div>

  </div>

  <script>
    // 지도 객체
    let map;

    // 장소 검색 서비스 객체
    let placesService;

    // 마커 저장 배열
    let markers = [];

    // 현재 위치 마커
    let currentMarker;

    // 카카오맵 로드 후 실행
    kakao.maps.load(() => {

      // 기본 중심 좌표 (서울)
      const defaultPosition = new kakao.maps.LatLng(37.5665, 126.9780);

      // 지도 생성
      map = new kakao.maps.Map(document.getElementById("map"), {
        center: defaultPosition,
        level: 5
      });

      // 장소 검색 객체 생성
      placesService = new kakao.maps.services.Places();

      // 현재 위치 가져오기
      getCurrentLocation();

      // 검색 이벤트 등록
      setupSearchEvent();
    });

    // 현재 위치 가져오기
    function getCurrentLocation() {

      // 브라우저가 위치 정보를 지원하는지 확인
      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          // 위치 가져오기 성공
          (position) => {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            const currentPosition = new kakao.maps.LatLng(latitude, longitude);

            // 지도 중심 이동
            map.setCenter(currentPosition);

            // 현재 위치 마커 표시
            currentMarker = new kakao.maps.Marker({
              map: map,
              position: currentPosition
            });

            // 인포윈도우 표시
            const infoWindow = new kakao.maps.InfoWindow({
              content: `
                <div style="padding:5px;font-size:13px;">
                  현재 위치
                </div>
              `
            });

            infoWindow.open(map, currentMarker);
          },

          // 위치 가져오기 실패
          () => {
            alert("위치 권한을 허용해주세요.");
          }

        );

      } else {
        alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
      }
    }

    // 검색 이벤트 등록
    function setupSearchEvent() {

      const searchForm = document.getElementById("searchForm");

      searchForm.addEventListener("submit", (event) => {

        // 새로고침 방지
        event.preventDefault();

        const keyword = document.getElementById("keyword").value.trim();

        // 검색어 확인
        if (!keyword) {
          alert("검색어를 입력해주세요.");
          return;
        }

        // 장소 검색 실행
        searchPlaces(keyword);
      });
    }

    // 장소 검색 함수
    function searchPlaces(keyword) {

      placesService.keywordSearch(keyword, (data, status) => {

        // 검색 성공
        if (status === kakao.maps.services.Status.OK) {

          displayPlaces(data);

        } else {

          alert("검색 결과가 없습니다.");
        }
      });
    }

    // 검색 결과 출력
    function displayPlaces(places) {

      const resultList = document.getElementById("resultList");

      // 기존 결과 초기화
      resultList.innerHTML = "";

      // 기존 마커 제거
      removeMarkers();

      // 지도 범위 재설정용 객체
      const bounds = new kakao.maps.LatLngBounds();

      places.forEach((place) => {

        const position = new kakao.maps.LatLng(place.y, place.x);

        // 마커 생성
        const marker = new kakao.maps.Marker({
          map: map,
          position: position
        });

        markers.push(marker);

        // 지도 범위 추가
        bounds.extend(position);

        // 리스트 아이템 생성
        const item = document.createElement("div");
        item.className = "place-item";

        item.innerHTML = `
          <div class="place-name">${place.place_name}</div>
          <div class="place-address">${place.address_name}</div>
          <div class="place-phone">${place.phone || "전화번호 없음"}</div>
        `;

        // 리스트 클릭 시 지도 이동
        item.addEventListener("click", () => {

          map.setCenter(position);

          const infoWindow = new kakao.maps.InfoWindow({
            content: `
              <div style="padding:5px;font-size:13px;">
                ${place.place_name}
              </div>
            `
          });

          infoWindow.open(map, marker);
        });

        resultList.appendChild(item);
      });

      // 검색 결과가 모두 보이도록 지도 범위 조정
      map.setBounds(bounds);
    }

    // 기존 마커 제거 함수
    function removeMarkers() {

      markers.forEach((marker) => {
        marker.setMap(null);
      });

      markers = [];
    }
  </script>

</body>
</html>
