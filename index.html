<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우연히 내게오나봐~ 데이트 코스 추천</title>

  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services,clusterer,drawing&autoload=false"></script>

  <style>
    /* 1. 봄 느낌 핑크 테마 변수 */
    :root {
      --main-pink: #ffafbd;
      --light-pink: #ffc3a0;
      --point-rose: #ff6b81;
      --bg-pink: #fff5f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-color: var(--bg-pink); }

    /* 2. 헤더 디자인 (기존 노란색 삭제) */
    header { 
      background: linear-gradient(135deg, var(--main-pink), var(--light-pink)); 
      padding: 15px 0; 
      text-align: center;
      box-shadow: 0 4px 15px rgba(255, 107, 129, 0.2);
      z-index: 100;
    }
    header h1 { color: white; font-size: 20px; margin-bottom: 12px; font-weight: 800; }

    /* 3. 탭 버튼 디자인 */
    .tab-container { display: flex; justify-content: center; gap: 10px; }
    .tab { 
      padding: 8px 20px; 
      cursor: pointer; 
      border-radius: 20px; 
      font-weight: bold; 
      background: white; 
      color: var(--point-rose);
      border: none;
      transition: 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .tab.active { background: var(--point-rose); color: white; }

    .main-content { display: flex; flex: 1; width: 100%; height: calc(100vh - 110px); }

    /* 4. 사이드바 디자인 */
    .sidebar { width: 320px; background: white; border-right: 1px solid #ffe4e6; display: flex; flex-direction: column; }
    #locStatus { padding: 12px; font-size: 13px; background: #fff0f3; color: var(--point-rose); font-weight: bold; text-align: center; border-bottom: 1px solid #ffe4e6; }
    .result-list { flex: 1; overflow-y: auto; }
    .place-item { padding: 15px; border-bottom: 1px solid #fff0f3; cursor: pointer; transition: 0.2s; }
    .place-item:hover { background: #fff9fa; }
    .place-name { font-weight: bold; color: #444; font-size: 15px; margin-bottom: 4px; }
    .place-info { font-size: 12px; color: #999; }

    /* 5. 지도 영역 */
    .map-area { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* 6. 시작 팝업 (가장 중요!) */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: white; padding: 40px; border-radius: 25px; text-align: center; width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 4px solid var(--main-pink); }
    .modal-content h2 { color: var(--point-rose); margin-bottom: 15px; font-size: 22px; }
    .modal-content input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid var(--main-pink); border-radius: 10px; outline: none; font-size: 16px; text-align: center; }
    .btn-go { background: var(--point-rose); color: white; border: none; padding: 12px 0; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>

<header>
  <h1>🌸 우연히 내게오나봐~ 데이트 코스</h1>
  <div class="tab-container">
    <button id="btnFood" class="tab active" onclick="changeTab('food')">🍴 맛집/카페</button>
    <button id="btnPlay" class="tab" onclick="changeTab('play')">🎡 놀거리/체험</button>
  </div>
</header>

<div class="main-content">
  <div class="sidebar">
    <div id="locStatus">지역을 먼저 선택해주세요!</div>
    <div id="resultList" class="result-list"></div>
  </div>
  <div class="map-area">
    <div id="map"></div>
  </div>
</div>

<div id="welcomeModal" class="modal">
  <div class="modal-content">
    <h2>설레는 데이트 시작! ✨</h2>
    <p style="margin-bottom: 20px; font-size: 14px; color: #666;">어느 지역에서 데이트하시나요?</p>
    <input type="text" id="startLocation" placeholder="예: 연남동, 강남역, 일산" onkeyup="if(window.event.keyCode==13)initSearch()">
    <button class="btn-go" onclick="initSearch()">추천 코스 보기</button>
  </div>
</div>
