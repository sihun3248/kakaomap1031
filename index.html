<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 사이트 제목 -->
  <title>우연히 내게오나봐~ 데이트 코스 추천 지도</title>

  <!-- 카카오맵 SDK -->
  <script
    type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"
  ></script>

  <!-- 폰트 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Pretendard:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(
        180deg,
        #fff0f6 0%,
        #ffe4ec 100%
      );
    }

    /* 벚꽃 배경 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        url("https://images.unsplash.com/photo-1522383225653-ed111181a951?q=80&w=1200&auto=format&fit=crop");
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -2;
    }

    /* 핑크 오버레이 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        rgba(255,255,255,0.45),
        rgba(255,240,246,0.75)
      );
      z-index: -1;
    }

    /* 전체 레이아웃 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      backdrop-filter: blur(4px);
    }

    /* 왼쪽 사이드바 */
    .sidebar {
      width: 38%;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.72);
      border-right: 1px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(14px);
      box-shadow: 4px 0 20px rgba(255, 182, 193, 0.2);
    }

    /* 상단 검색 영역 */
    .search-box {
      padding: 24px;
      border-bottom: 1px solid #ffd4e2;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.8),
        rgba(255,240,245,0.6)
      );
    }

    /* 메인 제목 */
    .main-title {
      font-size: 38px;
      font-family: "Nanum Pen Script", cursive;
      color: #ff5c93;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(255,105,180,0.2);
    }

    /* 서브 제목 */
    .sub-title {
      text-align: center;
      color: #c96a87;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* 검색창 */
    .search-form {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-form input {
      flex: 1;
      padding: 13px;
      border: 2px solid #ffd3e1;
      border-radius: 14px;
      font-size: 14px;
      background-color: rgba(255,255,255,0.85);
      outline: none;
      transition: 0.2s;
    }

    .search-form input:focus {
      border-color: #ff8fb1;
      box-shadow: 0 0 10px rgba(255,143,177,0.3);
    }

    .search-form button {
      padding: 13px 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(
        135deg,
        #ff8fb1,
        #ffb6c9
      );
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 5px 12px rgba(255,105,180,0.2);
    }

    .search-form button:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 10px;
    }

    .tab-button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background-color: #ffe4ec;
      color: #d34f7c;
      font-weight: bold;
      transition: 0.2s;
    }

    .tab-button.active {
      background: linear-gradient(
        135deg,
        #ff7ea6,
        #ffb6c9
      );
      color: white;
      box-shadow: 0 5px 12px rgba(255,105,180,0.25);
    }

    /* 결과 리스트 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    /* 장소 카드 */
    .place-item {
      padding: 18px;
      margin-bottom: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      border: 1px solid #ffe0ea;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 6px 14px rgba(255,182,193,0.12);
    }

    .place-item:hover {
      transform: translateY(-4px);
      background-color: #fff7fa;
      box-shadow: 0 12px 22px rgba(255,182,193,0.22);
    }

    .place-name {
      font-size: 17px;
      font-weight: bold;
      color: #ff5c93;
      margin-bottom: 8px;
    }

    .place-address {
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    .place-phone {
      font-size: 13px;
      color: #999;
    }

    /* 지도 영역 */
    .map-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* 벚꽃 장식 */
    .flower-decoration {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 140px;
      opacity: 0.9;
      z-index: 10;
      animation: floating 4s ease-in-out infinite;
      filter: drop-shadow(
        0 10px 15px rgba(255,182,193,0.3)
      );
    }

    @keyframes floating {

      0% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(2deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    /* 팝업 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,192,203,0.25);
      backdrop-filter: blur(3px);
      z-index: 1000;
    }

    .location-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      background: rgba(255,255,255,0.92);
      padding: 28px;
      border-radius: 24px;
      z-index: 1001;
      box-shadow: 0 15px 35px rgba(255,105,180,0.2);
      text-align: center;
    }

    .location-popup h3 {
      color: #ff5c93;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .location-popup p {
      color: #888;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .location-popup input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ffd3e1;
      border-radius: 14px;
      margin-bottom: 14px;
      outline: none;
    }

    .location-popup button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(
        135deg,
        #ff8fb1,
        #ffb6c9
      );
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(255,105,180,0.2);
    }

    /* 모바일 */
    @media (max-width: 768px) {

      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 45%;
      }

      .map-area {
        height: 55%;
      }

      .main-title {
        font-size: 30px;
      }

      .flower-decoration {
        width: 90px;
      }
    }

  </style>
</head>

<body>

  <!-- 팝업 -->
  <div class="overlay" id="overlay"></div>

  <div class="location-popup" id="locationPopup">

    <h3>🌸 데이트 지역 선택 🌸</h3>

    <p>
      원하는 장소를 입력하면<br>
      가까운 데이트 코스를 추천해드려요
    </p>

    <input
      type="text"
      id="locationKeyword"
      placeholder="예: 성수동, 강남역, 홍대"
    />

    <button id="locationButton">
      설레는 장소 찾기 💕
    </button>

  </div>

  <!-- 전체 컨테이너 -->
  <div class="container">

    <!-- 왼쪽 영역 -->
    <div class="sidebar">

      <div class="search-box">

        <!-- 제목 -->
        <div class="main-title">
          우연히 내게오나봐~
        </div>

        <div class="sub-title">
          벚꽃처럼 설레는 데이트 코스 추천 지도 🌸
        </div>

        <!-- 검색 -->
        <form class="search-form" id="searchForm">

          <input
            type="text"
            id="keyword"
            placeholder="예: 분위기 좋은 카페"
          />

          <button type="submit">
            검색
          </button>

        </form>

        <!-- 탭 -->
        <div class="tabs">

          <button
            class="tab-button active"
            id="foodTab"
          >
            🍰 음식 코스
          </button>

          <button
            class="tab-button"
            id="activityTab"
          >
            🎠 체험 코스
          </button>

        </div>

      </div>

      <!-- 결과 리스트 -->
      <div
        class="result-list"
        id="resultList"
      ></div>

    </div>

    <!-- 지도 -->
    <div class="map-area">

      <!-- 벚꽃 장식 -->
      <img
        class="flower-decoration"
        src="https://cdn-icons-png.flaticon.com/512/766/766720.png"
      />

      <div id="map"></div>

    </div>

  </div>

  <script>

    // 지도 객체
    let map;

    // 장소 검색 서비스
    let placesService;

    // 주소 검색 서비스
    let geocoder;

    // 현재 위치
    let currentPosition;

    // 현재 위치 마커
    let currentMarker;

    // 마커 배열
    let markers = [];

    // 현재 탭
    let currentTab = "food";

    // 음식 카테고리
    const foodCategories = [
      "FD6",
      "CE7"
    ];

    // 체험 카테고리
    const activityCategories = [
      "CT1",
      "AT4"
    ];

    // 음식 아이콘
    const foodMarkerList = [
      "🍰",
      "🧁",
      "🍓",
      "☕",
      "🍒"
    ];

    // 체험 아이콘
    const activityMarkerList = [
      "🎠",
      "🎡",
      "🎨",
      "🎬",
      "💖"
    ];

    // 카카오맵 로드
    kakao.maps.load(() => {

      const defaultPosition =
        new kakao.maps.LatLng(
          37.5665,
          126.9780
        );

      // 지도 생성
      map = new kakao.maps.Map(
        document.getElementById("map"),
        {
          center: defaultPosition,
          level: 5
        }
      );

      // 서비스 객체 생성
      placesService =
        new kakao.maps.services.Places();

      geocoder =
        new kakao.maps.services.Geocoder();

      // 현재 위치 가져오기
      getCurrentLocation();

      // 이벤트 등록
      setupSearchEvent();
      setupTabEvent();
      setupLocationEvent();

    });

    // 현재 위치 가져오기
    function getCurrentLocation() {

      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          (position) => {

            const latitude =
              position.coords.latitude;

            const longitude =
              position.coords.longitude;

            currentPosition =
              new kakao.maps.LatLng(
                latitude,
                longitude
              );

            map.setCenter(currentPosition);

            // 현재 위치 마커
            currentMarker =
              new kakao.maps.Marker({
                map: map,
                position: currentPosition
              });

            // 현재 위치 안내
            const infoWindow =
              new kakao.maps.InfoWindow({

                content: `
                  <div style="
                    padding:8px;
                    font-size:13px;
                    color:#ff5c93;
                    font-weight:bold;
                  ">
                    🌸 현재 위치
                  </div>
                `
              });

            infoWindow.open(
              map,
              currentMarker
            );

          }

        );

      }
    }

    // 검색 이벤트
    function setupSearchEvent() {

      const searchForm =
        document.getElementById(
          "searchForm"
        );

      searchForm.addEventListener(
        "submit",
        (event) => {

          event.preventDefault();

          const keyword =
            document
              .getElementById("keyword")
              .value
              .trim();

          if (!keyword) {

            alert(
              "검색어를 입력해주세요 🌸"
            );

            return;
          }

          searchPlaces(keyword);

        }
      );
    }

    // 탭 이벤트
    function setupTabEvent() {

      const foodTab =
        document.getElementById(
          "foodTab"
        );

      const activityTab =
        document.getElementById(
          "activityTab"
        );

      foodTab.addEventListener(
        "click",
        () => {

          currentTab = "food";

          foodTab.classList.add(
            "active"
          );

          activityTab.classList.remove(
            "active"
          );

          clearResults();

        }
      );

      activityTab.addEventListener(
        "click",
        () => {

          currentTab = "activity";

          activityTab.classList.add(
            "active"
          );

          foodTab.classList.remove(
            "active"
          );

          clearResults();

        }
      );
    }

    // 지역 설정 이벤트
    function setupLocationEvent() {

      const button =
        document.getElementById(
          "locationButton"
        );

      button.addEventListener(
        "click",
        () => {

          const locationKeyword =
            document
              .getElementById(
                "locationKeyword"
              )
              .value
              .trim();

          if (!locationKeyword) {

            alert(
              "지역을 입력해주세요 🌸"
            );

            return;
          }

          geocoder.addressSearch(
            locationKeyword,
            (result, status) => {

              if (
                status ===
                kakao.maps.services.Status.OK
              ) {

                const latitude =
                  result[0].y;

                const longitude =
                  result[0].x;

                currentPosition =
                  new kakao.maps.LatLng(
                    latitude,
                    longitude
                  );

                map.setCenter(
                  currentPosition
                );

                // 기존 위치 마커 제거
                if (currentMarker) {
                  currentMarker.setMap(
                    null
                  );
                }

                // 새 위치 마커
                currentMarker =
                  new kakao.maps.Marker({
                    map: map,
                    position:
                      currentPosition
                  });

                // 팝업 닫기
                document.getElementById(
                  "locationPopup"
                ).style.display = "none";

                document.getElementById(
                  "overlay"
                ).style.display = "none";

              } else {

                alert(
                  "지역을 찾을 수 없습니다 😢"
                );

              }

            }
          );

        }
      );
    }

    // 장소 검색
    function searchPlaces(keyword) {

      const categoryCodes =
        currentTab === "food"
          ? foodCategories
          : activityCategories;

      let allResults = [];

      let completed = 0;

      categoryCodes.forEach(
        (categoryCode) => {

          placesService.keywordSearch(

            keyword,

            (data, status) => {

              completed++;

              if (
                status ===
                kakao.maps.services.Status.OK
              ) {

                const filtered =
                  data.filter(
                    (place) =>
                      place.category_group_code ===
                      categoryCode
                  );

                allResults = [
                  ...allResults,
                  ...filtered
                ];
              }

              if (
                completed ===
                categoryCodes.length
              ) {

                displayPlaces(
                  allResults
                );

              }

            },

            {
              location:
                currentPosition,
              radius: 5000
            }

          );

        }
      );
    }

    // 검색 결과 출력
    function displayPlaces(places) {

      const resultList =
        document.getElementById(
          "resultList"
        );

      resultList.innerHTML = "";

      removeMarkers();

      const bounds =
        new kakao.maps.LatLngBounds();

      places.forEach((place) => {

        const position =
          new kakao.maps.LatLng(
            place.y,
            place.x
          );

        // 랜덤 아이콘 선택
        const markerEmoji =
          currentTab === "food"
            ? foodMarkerList[
                Math.floor(
                  Math.random() *
                  foodMarkerList.length
                )
              ]
            : activityMarkerList[
                Math.floor(
                  Math.random() *
                  activityMarkerList.length
                )
              ];

        // 커스텀 마커
        const markerContent = `
          <div style="
            width:48px;
            height:48px;
            border-radius:50%;
            background:
              linear-gradient(
                135deg,
                #ff9fbc,
                #ffd1dc
              );
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            border:3px solid white;
            box-shadow:
              0 8px 18px
              rgba(255,105,180,0.28);
            transform:
              translate(-50%, -100%);
            backdrop-filter:blur(4px);
          ">
            ${markerEmoji}
          </div>
        `;

        const customMarker =
          new kakao.maps.CustomOverlay({
            position: position,
            content: markerContent
          });

        customMarker.setMap(map);

        markers.push(customMarker);

        bounds.extend(position);

        // 카드 생성
        const item =
          document.createElement(
            "div"
          );

        item.className =
          "place-item";

        item.innerHTML = `
          <div class="place-name">
            ${place.place_name}
          </div>

          <div class="place-address">
            📍 ${place.address_name}
          </div>

          <div class="place-phone">
            ☎️
            ${
              place.phone ||
              "전화번호 없음"
            }
          </div>
        `;

        // 카드 클릭 이벤트
        item.addEventListener(
          "click",
          () => {

            map.setCenter(position);

            const infoWindow =
              new kakao.maps.InfoWindow({

                content: `
                  <div style="
                    padding:10px;
                    font-size:13px;
                    color:#ff5c93;
                    font-weight:bold;
                  ">
                    ${markerEmoji}
                    ${place.place_name}
                  </div>
                `
              });

            const marker =
              new kakao.maps.Marker({
                map: map,
                position: position
              });

            infoWindow.open(
              map,
              marker
            );

          }
        );

        resultList.appendChild(item);

      });

      // 결과 없을 경우
      if (places.length === 0) {

        resultList.innerHTML = `
          <div style="
            text-align:center;
            padding:40px;
            color:#999;
          ">
            🌸 검색 결과가 없어요 🌸
          </div>
        `;

        return;
      }

      // 지도 범위 조정
      map.setBounds(bounds);

    }

    // 결과 초기화
    function clearResults() {

      document.getElementById(
        "resultList"
      ).innerHTML = "";

      removeMarkers();

    }

    // 마커 제거
    function removeMarkers() {

      markers.forEach((marker) => {
        marker.setMap(null);
      });

      markers = [];

    }

  </script>

</body>
</html>
