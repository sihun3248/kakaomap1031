<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데이트 코스 추천 지도</title>

  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* 헤더 및 탭 스타일 */
    header { background: #ffcd00; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .tab-container { display: flex; background: #fff; border-radius: 20px; padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .tab { padding: 8px 20px; cursor: pointer; border-radius: 15px; font-weight: bold; transition: 0.3s; color: #666; }
    .tab.active { background: #333; color: #fff; }

    .container { display: flex; flex: 1; width: 100%; height: calc(100vh - 65px); }

    /* 사이드바 */
    .sidebar { width: 350px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
    .location-info { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #eee; font-size: 14px; font-weight: bold; color: #333; }
    .result-list { flex: 1; overflow-y: auto; }
    .place-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
    .place-item:hover { background: #fff9e6; }
    .place-name { font-weight: bold; color: #333; margin-bottom: 5px; font-size: 16px; }
    .place-category { font-size: 12px; color: #888; }
    .place-dist { font-size: 12px; color: #ff6b6b; margin-top: 5px; font-weight: bold; }

    /* 지도 */
    .map-area { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* 초기 팝업 스타일 */
    .modal { display: flex; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
    .modal-content { background: #fff; width: 320px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-content h3 { margin-bottom: 10px; color: #333; }
    .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ffcd00; border-radius: 10px; outline: none; font-size: 16px; }
    .btn-start { background: #ffcd00; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; }
    .btn-start:hover { background: #f5c400; }
  </style>
</head>
<body>

<header>
  <div style="font-weight: 900; font-size: 20px; color: #333;">✨ DATE MAP</div>
  <div class="tab-container">
    <div class="tab active" id="tabFood" onclick="switchTab('food')">음식 코스</div>
    <div class="tab" id="tabActivity" onclick="switchTab('activity')">체험 코스</div>
  </div>
  <button style="padding: 5px 10px; border: 1px solid #333; background: none; border-radius: 5px; cursor: pointer; font-size: 12px;" onclick="location.reload()">다시 검색</button>
</header>

<div class="container">
  <div class="sidebar">
    <div class="location-info" id="currentLocation
