<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데이트 코스 추천 지도</title>

  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"></script>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* 헤더 및 탭 스타일 */
    header { background: #ffcd00; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .tab-container { display: flex; background: #fff; border-radius: 20px; padding: 5px; }
    .tab { padding: 8px 20px; cursor: pointer; border-radius: 15px; font-weight: bold; transition: 0.3s; }
    .tab.active { background: #333; color: #fff; }

    .container { display: flex; flex: 1; width: 100%; height: calc(100vh - 60px); }

    /* 사이드바 */
    .sidebar { width: 350px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
    .location-info { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #eee; font-size: 14px; }
    .result-list { flex: 1; overflow-y: auto; }
    .place-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
    .place-item:hover { background: #fef9e7; }
    .place-name { font-weight: bold; color: #e67e22; margin-bottom: 5px; }
    .place-category { font-size: 12px; color: #999; }

    /* 지도 */
    .map-area { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* 팝업 스타일 */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: #fff; width: 300px; padding: 20px; border-radius: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .modal-content input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; }
    .btn-main { background: #ffcd00; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <div style="font-weight: bold; font-size: 18px;">❤️ 데이트 지도</div>
  <div class="tab-container">
    <div class="tab active" id="tabFood" onclick="changeTab('food')">음식 코스</div>
    <div class="tab" id="tabActivity" onclick="changeTab('activity')">체험 코스</div>
  </div>
  <button class="btn-main" onclick="openLocationModal()">지역 변경</button>
</header>

<div class="container">
  <div class="sidebar">
    <div class="location-info" id="currentLocationText">설정된 지역: 서울</div>
    <div class="result-list" id="resultList"></div>
  </div>
  <div class="map-area">
    <div id="map"></div>
  </div>
</div>

<div id="locationModal" class="modal">
  <div class="modal-content">
    <h3>어디서 데이트하시나요?</h3>
    <p style="font-size: 12px; color: #666;">예: 홍대, 강남역, 성수동</p>
    <input type="text" id="areaInput" placeholder="지역명 입력" onkeyup="if(window.event.keyCode==13){setArea()}">
    <button class="btn-main" onclick="setArea()">설정 완료</button>
  </div>
</div>

<script>
  let map;
  let placesService;
  let markers = [];
  let currentSearchCenter; // 현재 기준 위치 (좌표)
  let currentTab = 'food'; // 현재 선택된 탭

  // 마커 아이콘 이미지 경로 (Google Material Icons API 활용)
  const ICON_FOOD = "https://maps.google.com/mapfiles/kml/pal2/icon47.png"; // 식당 아이콘
  const ICON_ACTIVITY = "https://maps.google.com/mapfiles/kml/pal2/icon51.png"; // 체험 아이콘

  kakao.maps.load(() => {
    const container = document.getElementById('map');
    const options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 4 };
    map = new kakao.maps.Map(container, options);
    placesService = new kakao.maps.services.Places();

    // 초기 실행: 팝업 띄우기
    openLocationModal();
  });

  // 팝업 열기/닫기
  function openLocationModal() { document.getElementById('locationModal').style.display = 'block'; }
  function closeLocationModal() { document.getElementById('locationModal').style.display = 'none'; }

  // 지역 설정 및 검색 시작
  function setArea() {
    const area = document.getElementById('areaInput').value;
    if (!area) return alert("지역을 입력해주세요!");

    // 주소-좌표 변환 객체 생성
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(area, (result, status) => {
      if (status === kakao.maps.services.Status.OK) {
        currentSearchCenter = new kakao.maps.LatLng(result[0].y, result[0].x);
        map.setCenter(currentSearchCenter);
        document.getElementById('currentLocationText').innerText = `설정된 지역: ${area}`;
        closeLocationModal();
        searchByTab(); // 탭에 맞는 검색 실행
      } else {
        // 주소 검색 실패 시 키워드 검색 시도
        placesService.keywordSearch(area, (data, status) => {
          if (status === kakao.maps.services.Status.OK) {
            currentSearchCenter = new kakao.maps.LatLng(data[0].y, data[0].x);
            map.setCenter(currentSearchCenter);
            document.getElementById('currentLocationText').innerText = `설정된 지역: ${area}`;
            closeLocationModal();
            searchByTab();
          } else {
            alert("지역을 찾을 수 없습니다.");
          }
        });
      }
    });
  }

  // 탭 전환
  function changeTab(type) {
    currentTab = type;
    document.getElementById('tabFood').classList.toggle('active', type === 'food');
    document.getElementById('tabActivity').classList.toggle('active', type === 'activity');
    if (currentSearchCenter) searchByTab();
  }

  // 탭별 로직 분기
  function searchByTab() {
    removeMarkers();
    const listEl = document.getElementById('resultList');
    listEl.innerHTML = "";

    if (currentTab === 'food') {
      // 음식(FD6) + 카페(CE7) 검색
      searchCombined(['FD6', 'CE7'], ICON_FOOD);
    } else {
      // 문화(CT1) + 관광(AT4) 검색
      searchCombined(['CT1', 'AT4'], ICON_ACTIVITY);
    }
  }

  // 여러 카테고리 코드를 한 번에 검색하여 합치는 함수
  function searchCombined(codes, iconUrl) {
    let combinedData = [];
    let count = 0;

    codes.forEach(code => {
      placesService.categorySearch(code, (data, status) => {
        if (status === kakao.maps.services.Status.OK) {
          combinedData = combinedData.concat(data);
        }
        count++;
        if (count === codes.length) {
          // 거리순 정렬 (현재 설정 위치 기준)
          combinedData.sort((a, b) => a.distance - b.distance);
          displayResults(combinedData, iconUrl);
        }
      }, { location: currentSearchCenter, radius: 2000, sort: kakao.maps.services.SortBy.DISTANCE });
    });
  }

  // 결과 출력
  function displayResults(places, iconUrl) {
    const listEl = document.getElementById('resultList');
    const bounds = new kakao.maps.LatLngBounds();

    places.forEach(place => {
      const position = new kakao.maps.LatLng(place.y, place.x);
      
      // 마커 생성 (커스텀 아이콘 적용)
      const imageSize = new kakao.maps.Size(32, 32);
      const markerImage = new kakao.maps.MarkerImage(iconUrl, imageSize);
      const marker = new kakao.maps.Marker({ map: map, position: position, image: markerImage });
      
      markers.push(marker);
      bounds.extend(position);

      // 사이드바 아이템 생성
      const item = document.createElement('div');
      item.className = 'place-item';
      item.innerHTML = `
        <div class="place-name">${place.place_name}</div>
        <div class="place-category">${place.category_name}</div>
        <div style="font-size:12px; margin-top:5px;">📍 ${place.distance}m</div>
      `;

      item.onclick = () => {
        map.panTo(position);
        new kakao.maps.InfoWindow({ content: `<div style="padding:5px;font-size:12px;">${place.place_name}</div>`, removable: true }).open(map, marker);
      };
      listEl.appendChild(item);
    });
  }

  function removeMarkers() {
    markers.forEach(m => m.setMap(null));
    markers = [];
  }
</script>

</body>
</html>
