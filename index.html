<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>카카오맵 테스트</title>
    <style>
        #container { display: flex; width: 100%; height: 100vh; }
        #sidebar { width: 300px; background: #eee; padding: 10px; }
        /* 지도 크기가 반드시 명시되어야 해! */
        #map { flex: 1; height: 100vh; background-color: #ccc; } 
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <input type="text" id="keyword" placeholder="검색어 입력">
            <button onclick="searchPlaces()">검색</button>
            <ul id="results-list"></ul>
        </div>
        <div id="map"></div> </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ecaf8e9e8be5e5b6e158dfeb3b7372df&libraries=services&autoload=false"></script>

    <script>
        let map;
        let ps;

        kakao.maps.load(function() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청
                level: 5
            };
            map = new kakao.maps.Map(container, options);
            ps = new kakao.maps.services.Places();

            // 위치 권한 시도 (실패해도 지도는 뜸)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const moveLatLon = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    map.setCenter(moveLatLon);
                });
            }
        });

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            ps.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const bounds = new kakao.maps.LatLngBounds();
                    for (let i = 0; i < data.length; i++) {
                        displayMarker(data[i]);
                        bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
                    }
                    map.setBounds(bounds);
                }
            });
        }

        function displayMarker(place) {
            const marker = new kakao.maps.Marker({
                map: map,
                position: new kakao.maps.LatLng(place.y, place.x)
            });
        }
    </script>
</body>
</html>
